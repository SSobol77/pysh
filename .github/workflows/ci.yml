name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (python-3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install zsh and packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh dpkg-dev fakeroot rpm

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package (with dev extras when available)
        run: |
          if python -m pip install -e ".[dev]"; then
            echo "Installed with [dev] extra."
          else
            echo "Falling back to plain editable install."
            python -m pip install -e .
          fi

      - name: Ensure build/quality tools are available
        run: python -m pip install --upgrade pytest ruff build twine

      - name: Run pytest
        run: pytest -q

      - name: Run ruff
        run: ruff check src tests

      - name: Build sdist and wheel
        run: |
          rm -rf dist build
          python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Smoke test (pysh --version)
        run: pysh --version

      - name: Smoke test (python -m pysh --version)
        run: python -m pysh --version

      - name: Syntax-check packaging shell scripts
        run: |
          bash -n scripts/build_pysh_package.sh
          bash -n scripts/build_deb.sh
          bash -n scripts/build_rpm.sh
          bash -n scripts/build_release_artifacts.sh
          bash -n scripts/check_release_artifacts.sh

      - name: Build Debian .deb (if dpkg-deb available)
        run: |
          if command -v dpkg-deb >/dev/null 2>&1; then
            bash scripts/build_deb.sh
          else
            echo "dpkg-deb not available; skipping .deb build."
          fi

      - name: Build RPM .rpm (if rpmbuild available)
        run: |
          if command -v rpmbuild >/dev/null 2>&1; then
            bash scripts/build_rpm.sh
          else
            echo "rpmbuild not available; skipping .rpm build."
          fi

      - name: Verify release artifacts + SHA256SUMS
        run: |
          if ls dist/*.whl >/dev/null 2>&1 \
              && ls dist/*.tar.gz >/dev/null 2>&1 \
              && ls dist/os/deb/*.deb >/dev/null 2>&1 \
              && ls dist/os/rpm/*.rpm >/dev/null 2>&1 \
              && ls dist/os/freebsd/*.pkg >/dev/null 2>&1; then
            bash scripts/check_release_artifacts.sh
          else
            echo "Skipping check_release_artifacts.sh: full release artifact set not present (.whl/.tar.gz/.deb/.rpm/.pkg required)."
          fi
