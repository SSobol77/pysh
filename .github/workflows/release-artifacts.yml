# SPDX-License-Identifier: GPL-3.0-or-later
# Builds the Debian .deb and RPM .rpm artifacts for a GitHub Release
# and attaches them (plus SHA256SUMS) to that release using the GitHub
# CLI. PyPI publishing is intentionally NOT performed here; it stays in
# publish.yml under PyPI Trusted Publishing.

name: Release artifacts (deb + rpm)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  os-packages:
    name: Build & attach .deb and .rpm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rpm

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build PyPI artifacts (for SHA256SUMS, not published here)
        run: bash scripts/build_pysh_package.sh

      - name: Build Debian .deb
        run: bash scripts/build_deb.sh

      - name: Build RPM .rpm
        run: bash scripts/build_rpm.sh

      - name: Verify canonical artifact names + generate SHA256SUMS
        run: bash scripts/check_release_artifacts.sh

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          DEB_FILE=$(ls dist/os/deb/pysh-shell_*-1_all.deb)
          RPM_FILE=$(ls dist/os/rpm/pysh-shell-*-1.noarch.rpm)
          SHA_FILE=dist/SHA256SUMS
          gh release upload "${TAG}" \
            "${DEB_FILE}" \
            "${RPM_FILE}" \
            "${SHA_FILE}" \
            --clobber
