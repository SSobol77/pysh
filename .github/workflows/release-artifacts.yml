name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  freebsd-pkg:
    name: Build FreeBSD .pkg
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and inspect FreeBSD .pkg
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          prepare: |
            pkg update -f
            pkg install -y python313
          run: |
            set -eu
            test "$(uname -s)" = "FreeBSD"
            major="$(uname -r | awk -F. '{print $1}')"
            test "${major}" -ge 14
            python3.13 --version
            pkg --version
            VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
            PKG_PATH="dist/os/freebsd/pysh-shell-${VERSION}.pkg"
            sh scripts/build_freebsd_pkg.sh
            test -f "${PKG_PATH}"
            pkg info -F "${PKG_PATH}"
            pkg query -F "${PKG_PATH}" "%Fp" | tee /tmp/pysh-freebsd-pkg-files
            grep -Fx /usr/local/bin/pysh /tmp/pysh-freebsd-pkg-files
            grep -E '^/usr/local/lib/pysh-shell/pysh(/|$)' \
              /tmp/pysh-freebsd-pkg-files

      - name: Verify FreeBSD .pkg artifact on host
        run: |
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
          test -f "dist/os/freebsd/pysh-shell-${VERSION}.pkg"

      - name: Upload FreeBSD .pkg workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-pkg
          path: dist/os/freebsd/pysh-shell-*.pkg
          if-no-files-found: error

  release-assets:
    name: Build & attach release assets
    runs-on: ubuntu-latest
    needs: freebsd-pkg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rpm

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build PyPI artifacts
        run: bash scripts/build_pysh_package.sh

      - name: Build Debian .deb
        run: bash scripts/build_deb.sh

      - name: Build RPM .rpm
        run: bash scripts/build_rpm.sh

      - name: Download FreeBSD .pkg
        uses: actions/download-artifact@v4
        with:
          name: freebsd-pkg
          path: dist/os/freebsd

      - name: Verify canonical artifact names + stage flat release assets
        run: bash scripts/check_release_artifacts.sh

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "${TAG}" \
            dist/release-assets/* \
            --clobber
