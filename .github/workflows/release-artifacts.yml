name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-assets:
    name: Build & attach release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rpm

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build PyPI artifacts
        run: bash scripts/build_pysh_package.sh

      - name: Build Debian .deb
        run: bash scripts/build_deb.sh

      - name: Build RPM .rpm
        run: bash scripts/build_rpm.sh

      - name: Verify canonical artifact names + stage flat release assets
        run: bash scripts/check_release_artifacts.sh

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "${TAG}" \
            dist/release-assets/* \
            --clobber
