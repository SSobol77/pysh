name: FreeBSD package

on:
  push:
    branches:
      - "release/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freebsd-pkg:
    name: Build FreeBSD .pkg
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and inspect FreeBSD .pkg
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          prepare: |
            pkg update -f
            pkg install -y python313
          run: |
            set -eu
            test "$(uname -s)" = "FreeBSD"
            major="$(uname -r | awk -F. '{print $1}')"
            test "${major}" -ge 14
            python3.13 --version
            pkg --version
            VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
            PKG_PATH="dist/os/freebsd/pysh-shell-${VERSION}.pkg"
            sh scripts/build_freebsd_pkg.sh
            test -f "${PKG_PATH}"
            pkg info -F "${PKG_PATH}"
            pkg query -F "${PKG_PATH}" "%Fp" | tee /tmp/pysh-freebsd-pkg-files
            grep -Fx /usr/local/bin/pysh /tmp/pysh-freebsd-pkg-files
            grep -E '^/usr/local/lib/pysh-shell/pysh(/|$)' \
              /tmp/pysh-freebsd-pkg-files

      - name: Verify FreeBSD .pkg artifact on host
        run: |
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
          test -f "dist/os/freebsd/pysh-shell-${VERSION}.pkg"

      - name: Upload FreeBSD .pkg workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-pkg
          path: dist/os/freebsd/pysh-shell-*.pkg
          if-no-files-found: error
